server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    # Correct MIME type for ES modules
    types {
        text/html html;
        text/css css;
        text/javascript js mjs;
    }
}
